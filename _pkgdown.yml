url: https://zirenjiang.github.io/refundBayes/

template:
  bootstrap: 5
  bootswatch: flatly          # clean, professional theme

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/ZirenJiang/refundBayes
      aria-label: GitHub

home:
  title: "refundBayes — Bayesian Regression with Functional Data"
  description: >
    Bayesian scalar-on-function, function-on-scalar, and functional Cox
    regression models fitted via Stan.
  links:
  - text: "Paper (Statistics in Medicine)"
    href: https://doi.org/10.1002/sim.70265

reference:
- title: "Scalar-on-Function Regression"
  desc: >
    Model a scalar outcome as a function of one or more functional predictors.
  contents:
  - sofr_bayes

- title: "Function-on-Scalar Regression"
  desc: >
    Model a functional outcome as a function of scalar predictors.
  contents:
  - fosr_bayes

- title: "Function-on-Function Regression"
  desc: >
    Model a functional outcome as a function of functional (and optional scalar) predictors.
  contents:
  - fofr_bayes

- title: "Functional Cox Regression"
  desc: >
    Survival model with functional predictors and right-censored outcomes.
  contents:
  - fcox_bayes

- title: "Functional Principal Component Analysis"
  desc: >
    Bayesian FPCA decomposition of a functional outcome.
  contents:
  - fpca_bayes

- title: "Post-fitting"
  desc: "Methods for summarising and plotting fitted models."
  contents:
  - summary.refundBayes
  - plot.refundBayes


articles:
- title: "Tutorials"
  navbar: Tutorials
  contents:
  - sofr_bayes_vignette
  - fosr_bayes_vignette
  - fofr_bayes_vignette
  - fcox_bayes_vignette
  - fpca_bayes_vignette
  - joint_FPCA_vignette

